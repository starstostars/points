<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>침구치료 자침 가이드 웹앱 Ver.2</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e2e8f0;
            --warning-bg: #fff3cd;
            --warning-text: #856404;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* 상단 고정 카테고리 네비게이션 메뉴 */
        header {
            position: sticky;
            top: 0;
            background-color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 1000;
            padding: 12px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
        }
        
        .category-btn {
            padding: 10px 20px;
            background-color: var(--secondary-color);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: #ecf0f1;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        
        .category-btn.active, .category-btn:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        /* 메인 콘텐츠 레이아웃 */
        main {
            padding: 30px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 서브 탭 스타일 (질환군 내부 선택 메뉴) */
        .sub-tab-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .sub-tab-btn {
            padding: 8px 16px;
            background-color: #e2e8f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #4a5568;
            font-weight: 500;
            transition: all 0.2s;
        }

        .sub-tab-btn.active, .sub-tab-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        /* 좌측 사진 - 우측 설명 카드 레이아웃 */
        .card {
            display: flex;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid var(--border-color);
            min-height: 500px;
        }

        .card-photo-side {
            flex: 0 0 45%;
            background-color: #eaedd0;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
        }

        .image-container {
            width: 100%;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .card-content-side {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .disease-title {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent-color);
        }

        .section-title {
            font-size: 1.15rem;
            color: var(--primary-color);
            margin-top: 25px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .section-title:first-of-type { margin-top: 0; }

        /* 태그(Pill) 디자인 */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background-color: #e1f0fa;
            color: #2980b9;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .tag.structure {
            background-color: #f1f0ff;
            color: #6c5ce7;
        }

        /* 클릭 가능한 혈자리 컴포넌트 스타일 */
        .acupoint {
            color: #e74c3c;
            font-weight: bold;
            text-decoration: underline;
            text-underline-offset: 3px;
            cursor: pointer;
            padding: 0 3px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .acupoint:hover {
            background-color: #fceceb;
        }

        /* 자침 방향 아이콘 */
        .direction-icon {
            display: inline-block;
            background: #ecf0f1;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-left: 4px;
        }

        .info-list {
            padding-left: 20px;
        }
        .info-list li {
            margin-bottom: 8px;
        }

        .warning-box {
            background-color: var(--warning-bg);
            color: var(--warning-text);
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #ffc107;
            margin-top: 15px;
            font-weight: bold;
        }

        .guide-box {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #c8e6c9;
            font-size: 0.9rem;
        }

        .action-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #27ae60;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        .action-btn:hover { background-color: #219653; }

        /* 혈위 정보 팝업 모달 */
        /* 변경 및 추가될 스타일 */
        .tag {
            background-color: #e1f0fa;
            color: #2980b9;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-block; /* details 태그 감싸기를 위해 추가 */
        }

/* 혈자리 토글 스타일 */
        .acupoint-toggle {
            display: inline-block;
        }
        .acupoint-toggle summary {
            list-style: none; /* 기본 화살표 숨기기 */
            cursor: pointer;
            color: #e74c3c;
            font-weight: bold;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .acupoint-toggle summary::-webkit-details-marker {
            display: none; /* 사파리 브라우저 화살표 숨기기 */
        }
        .acupoint-location {
            display: block;
            font-size: 0.8rem;
            color: #555;
            background: #fff;
            padding: 4px 8px;
            margin-top: 4px;
            border-radius: 4px;
            border: 1px solid #dcdde1;
            max-width: 200px; /* 말풍선처럼 너무 넓어지지 않게 제한 */
            white-space: normal; /* 글자 줄바꿈 허용 */
        }
        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            font-size: 22px; cursor: pointer; color: #999;
        }
        .modal-title { font-size: 1.3rem; color: var(--primary-color); margin-bottom: 15px; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px;}
        .modal-body { font-size: 1rem; color: #444; line-height: 1.6; }

        /* 반응형 모바일 레이아웃 */
        @media (max-width: 900px) {
            .card { flex-direction: column; }
            .card-photo-side { flex: 0 0 auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            .card-content-side { padding: 20px; }
        }
    </style>
</head>

    function parseDirectionIcons(text) {
        if (!text) return "";
        return text
            .replace(/(하사자)/g, '$1 <span class="direction-icon">↘️</span>')
            .replace(/(상사자)/g, '$1 <span class="direction-icon">↗️</span>')
            .replace(/(횡자)/g, '$1 <span class="direction-icon">➡️</span>')
            .replace(/(직자)/g, '$1 <span class="direction-icon">⬇️</span>');
    }

   function convertTextToAcupointLinks(text) {
        if (!text) return "";
        let renderedText = text;
        
        acupointDictionary.forEach(point => {
            const regex = new RegExp(`(${point.name})`, 'g');
            // 클릭하면 팝업이 뜨는 대신, details 태그를 이용해 바로 아래에 펼쳐지도록 변경
            const replaceHtml = `
                <details class="acupoint-toggle">
                    <summary>${point.name}</summary>
                    <span class="acupoint-location"><b>[${point.code}]</b><br>${point.location}</span>
                </details>
            `;
            renderedText = renderedText.replace(regex, replaceHtml);
        });
        return renderedText;
    }


    const navHeader = document.getElementById('nav-header');
    const subTabWrapper = document.getElementById('sub-tab-wrapper');
    const contentCard = document.getElementById('contentCard');

    function initWebApps() {
        appData.categories.forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = `category-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = cat.category_name;
            btn.onclick = () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchCategory(cat.id);
            };
            navHeader.appendChild(btn);
        });
        switchCategory(appData.categories[0].id);
    }

    function switchCategory(catId) {
        subTabWrapper.innerHTML = '';
        const selectedCat = appData.categories.find(c => c.id === catId);
        
        selectedCat.items.forEach((item, index) => {
            const subBtn = document.createElement('button');
            subBtn.className = `sub-tab-btn ${index === 0 ? 'active' : ''}`;
            subBtn.innerText = item.name;
            subBtn.onclick = () => {
                document.querySelectorAll('.sub-tab-btn').forEach(sb => sb.classList.remove('active'));
                subBtn.classList.add('active');
                renderContent(item, catId);
            };
            subTabWrapper.appendChild(subBtn);
        });

        if (selectedCat.items.length > 0) {
            renderContent(selectedCat.items[0], catId);
        }
    }

    function renderContent(item, catId) {

        if (catId === 'CAT_DIAGNOSIS') {

        contentCard.innerHTML = `

    function triggerCrossReference(catId, itemIndex) {
        const catBtns = document.querySelectorAll('.category-btn');
        const targetCatIdx = appData.categories.findIndex(c => c.id === catId);
        
        if (targetCatIdx !== -1) {
            catBtns[targetCatIdx].click();
            setTimeout(() => {
                const subBtns = document.querySelectorAll('.sub-tab-btn');
                if (subBtns[itemIndex]) {
                    subBtns[itemIndex].click();
                }
            }, 50);
        }
    }

    function triggerDongssiReference(catId, itemIndex, anchorId) {
        // 1단계: 지정 카테고리 및 하위 탭 원격 클릭 유도
        triggerCrossReference(catId, itemIndex);
        
        // 2단계: 렌더링 완료 타이밍에 맞춰 타겟 엘리먼트로 부드러운 스크롤 및 노란색 깜빡임 이펙트
        setTimeout(() => {
            const targetElement = document.getElementById(anchorId);
            if (targetElement) {
                targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                targetElement.style.backgroundColor = '#fff3cd';
                setTimeout(() => { targetElement.style.backgroundColor = ''; }, 1500);
            }
        }, 100);
    }
    
    initWebApps();
</script>
</body>
</html>
